name: FastAPI CI

# Run tests automatically whenever code is pushed to GitHub.
on:
  push:

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        # The FastAPI application and requirements.txt are inside backend/.
        working-directory: backend

    steps:
      # Step 1: Download the repository code into the GitHub Actions runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 for the CI environment.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Upgrade pip and install the application dependencies.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run pytest. The workflow fails if any test fails.
      - name: Run tests
        run: python -m pytest
